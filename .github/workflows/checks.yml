name: Checks

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Run tests with only test dependencies
        run: >-
          uv run --locked --no-dev --group test
          --python ${{ matrix.python-version }} pytest -q

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install the minimum supported Python
        run: uv python install 3.10
      - name: Check formatting
        run: uv run --locked --python 3.10 ruff format --check .
      - name: Lint
        run: uv run --locked --python 3.10 ruff check .

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install the minimum supported Python
        run: uv python install 3.10
      - name: Check licensing metadata
        run: uv run --locked --python 3.10 reuse lint

  build:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install the minimum supported Python
        run: uv python install 3.10
      - name: Build source and wheel distributions
        run: uv build --python 3.10 --no-sources

# Build the Sphinx docs and deploy them to GitHub Pages.
#
# This does nothing until Pages is enabled for the repository:
# Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# Until then the build job still runs (and catches broken docs), but the
# deploy job has nowhere to publish.
name: Docs

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build the docs
        run: >-
          uv run --locked --no-dev --group docs
          sphinx-build -b html -W docs docs/_build/html
      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Allow one concurrent deployment; don't cancel an in-progress publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

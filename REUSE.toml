version = 1

[[annotations]]
path = [
    "src/mealhealth/data/baseline_calories.csv",
    "src/mealhealth/data/baseline_intake.csv",
    "src/mealhealth/data/baseline_mediators.csv",
    "src/mealhealth/data/baseline_nutrients.csv",
    "src/mealhealth/data/local_life_table.csv",
    "src/mealhealth/data/population.csv",
    "src/mealhealth/data/relative_risks.csv",
    "src/mealhealth/data/sbp_age_attenuation.csv",
    "src/mealhealth/data/sodium_relative_risks.csv",
    "src/mealhealth/data/standard_life_table.csv",
]
precedence = "override"
SPDX-FileCopyrightText = [
    "Derived from IHME Global Burden of Disease (GBD)",
    "Derived from GDD-IA (Springmann M., Nature Food, 2026)",
    "Derived from UN World Population Prospects (WPP)",
]
SPDX-License-Identifier = "LicenseRef-MealHealth-NonCommercial-Data AND LicenseRef-IHME-NonCommercial"

[[annotations]]
path = "src/mealhealth/data/mortality.csv"
precedence = "override"
SPDX-FileCopyrightText = [
    "World Health Organization (WHO)",
    "Countries represented in the WHO Global Health Estimates source data",
    "2026 Koen van Greevenbroek (processing and adaptation)",
]
SPDX-License-Identifier = "LicenseRef-WHO-GHE-Terms"

[[annotations]]
# uv dependency lockfile, generated by uv (not hand-edited).
path = "uv.lock"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
# Curated regeneration inputs: literature/derived tables (the red-meat RR
# curve, the GBD 2023 TMREL table, and the age-attenuation ratios derived
# from the GBD 2019 age structure). Author-curated derived works.
path = "tools/reference/**.csv"
precedence = "override"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"

[[annotations]]
# Human-readable, source-pinned sodium coefficient reference artifact.
path = "tools/reference/**.json"
precedence = "override"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"

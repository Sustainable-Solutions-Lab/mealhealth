<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 580" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b6f76"/>
    </marker>
    <pattern id="hatchGreen" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <rect width="5" height="5" fill="#4e9d5b" opacity="0.16"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#4e9d5b" stroke-width="1.6"/>
    </pattern>
    <pattern id="hatchRed" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <rect width="5" height="5" fill="#bf4d45" opacity="0.16"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#bf4d45" stroke-width="1.6"/>
    </pattern>
  </defs>

  <!-- card -->
  <rect x="0" y="0" width="1120" height="580" rx="14" fill="#fbfbf9" stroke="#e2e0d8" stroke-width="1"/>

  <!-- title -->
  <text x="40" y="52" font-size="25" font-weight="700" fill="#23262b">How mealhealth scores a meal</text>

  <!-- ============ Block 1: substituted diet ============ -->
  <text x="40" y="100" font-size="14" font-weight="700" letter-spacing="0.5" fill="#8a5a2b">1 · BUILD THE SUBSTITUTED DIET</text>
  <text x="257" y="140" font-size="14" fill="#5c616a" text-anchor="middle">
    <tspan font-style="italic">f</tspan> = (<tspan font-style="italic">C</tspan><tspan baseline-shift="sub" font-size="10.5">base</tspan> − <tspan font-style="italic">C</tspan><tspan baseline-shift="sub" font-size="10.5">meal</tspan>) / <tspan font-style="italic">C</tspan><tspan baseline-shift="sub" font-size="10.5">base</tspan>
  </text>

  <!-- equal-calorie bracket between baseline top and substituted top -->
  <path d="M97 214 L97 206 L417 206 L417 214" fill="none" stroke="#c3c1b8" stroke-width="1"/>
  <text x="257" y="199" font-size="12" fill="#7a7f87" text-anchor="middle">equal total calories</text>

  <!-- baseline bar  (bottom→top: other, meat, grains, veg) -->
  <g>
    <rect x="70" y="360" width="54" height="120" fill="#c4c3bd"/>
    <rect x="70" y="315" width="54" height="45"  fill="#bf4d45"/>
    <rect x="70" y="255" width="54" height="60"  fill="#d6a95c"/>
    <rect x="70" y="220" width="54" height="35"  fill="#4e9d5b"/>
    <rect x="70" y="220" width="54" height="260" fill="none" stroke="#b7b5ac" stroke-width="1"/>
    <text x="97" y="502" font-size="13.5" fill="#3b3f45" text-anchor="middle" font-weight="600">baseline</text>
    <text x="97" y="519" font-size="12" fill="#7a7f87" text-anchor="middle">country diet</text>
  </g>

  <!-- x f -->
  <text x="150" y="356" font-size="21" fill="#5c616a" text-anchor="middle">× <tspan font-style="italic" font-size="17">f</tspan></text>

  <!-- scaled baseline (faded), aligned with the lower band of the substituted bar -->
  <g opacity="0.5">
    <rect x="176" y="408" width="54" height="72" fill="#c4c3bd"/>
    <rect x="176" y="381" width="54" height="27" fill="#bf4d45"/>
    <rect x="176" y="345" width="54" height="36" fill="#d6a95c"/>
    <rect x="176" y="324" width="54" height="21" fill="#4e9d5b"/>
  </g>
  <rect x="176" y="324" width="54" height="156" fill="none" stroke="#b7b5ac" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="203" y="502" font-size="12" fill="#7a7f87" text-anchor="middle">scaled down</text>

  <!-- plus -->
  <text x="256" y="356" font-size="23" fill="#5c616a" text-anchor="middle">+</text>

  <!-- meal bar (bottom→top: meat, grains, veg), aligned with the upper band of the substituted bar -->
  <g>
    <rect x="282" y="312" width="54" height="12" fill="#bf4d45"/>
    <rect x="282" y="280" width="54" height="32" fill="#d6a95c"/>
    <rect x="282" y="220" width="54" height="60" fill="#4e9d5b"/>
    <rect x="282" y="220" width="54" height="104" fill="none" stroke="#b7b5ac" stroke-width="1"/>
    <text x="309" y="342" font-size="13.5" fill="#3b3f45" text-anchor="middle" font-weight="600">this meal</text>
  </g>

  <!-- equals -->
  <text x="362" y="356" font-size="23" fill="#5c616a" text-anchor="middle">=</text>

  <!-- substituted diet -->
  <g>
    <g opacity="0.5">
      <rect x="388" y="408" width="58" height="72" fill="#c4c3bd"/>
      <rect x="388" y="381" width="58" height="27" fill="#bf4d45"/>
      <rect x="388" y="345" width="58" height="36" fill="#d6a95c"/>
      <rect x="388" y="324" width="58" height="21" fill="#4e9d5b"/>
    </g>
    <rect x="388" y="312" width="58" height="12" fill="#bf4d45"/>
    <rect x="388" y="280" width="58" height="32" fill="#d6a95c"/>
    <rect x="388" y="220" width="58" height="60" fill="#4e9d5b"/>
    <line x1="388" y1="324" x2="446" y2="324" stroke="#8a8d93" stroke-width="1" stroke-dasharray="2 2"/>
    <rect x="388" y="220" width="58" height="260" fill="none" stroke="#8a8d93" stroke-width="1.4"/>
    <text x="417" y="502" font-size="13.5" fill="#3b3f45" text-anchor="middle" font-weight="600">substituted</text>
    <text x="417" y="519" font-size="12" fill="#7a7f87" text-anchor="middle">day's diet</text>
  </g>

  <!-- arrow to block 2 -->
  <path d="M470 350 L516 350" stroke="#6b6f76" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ============ Block 2: dose-response ============ -->
  <text x="540" y="100" font-size="14" font-weight="700" letter-spacing="0.5" fill="#8a5a2b">2 · READ THE CHANGE IN RISK</text>

  <g>
    <line x1="560" y1="180" x2="560" y2="360" stroke="#9a9ea4" stroke-width="1.2"/>
    <line x1="560" y1="360" x2="748" y2="360" stroke="#9a9ea4" stroke-width="1.2"/>
    <text x="552" y="185" font-size="12.5" fill="#7a7f87" text-anchor="end">risk</text>
    <text x="752" y="379" font-size="12.5" fill="#7a7f87" text-anchor="start">intake</text>

    <!-- protective curve -->
    <path d="M560 205 C600 250 640 300 690 322 C715 332 730 333 740 333" fill="none" stroke="#4e9d5b" stroke-width="2.6"/>

    <!-- baseline point: on the curve at t=0.35 of the first segment -->
    <line x1="602" y1="360" x2="602" y2="253" stroke="#b7b5ac" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="602" cy="253" r="4.8" fill="#8a8d93"/>
    <text x="602" y="380" font-size="12.5" fill="#7a7f87" text-anchor="middle">baseline</text>

    <!-- with-meal point: on the curve at t=0.30 of the second segment -->
    <line x1="710" y1="360" x2="710" y2="329" stroke="#b7b5ac" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="710" cy="329" r="4.8" fill="#4e9d5b"/>
    <text x="710" y="380" font-size="12.5" fill="#4e9d5b" text-anchor="middle">with meal</text>

    <text x="650" y="204" font-size="12.5" fill="#3b3f45" text-anchor="middle">more veg →</text>
    <text x="650" y="220" font-size="12.5" fill="#3b3f45" text-anchor="middle">lower risk</text>
  </g>

  <text x="651" y="420" font-size="13" fill="#5c616a" text-anchor="middle">Each food group has its own risk curve.</text>
  <text x="651" y="439" font-size="13" fill="#5c616a" text-anchor="middle">The shift in risk from baseline carries forward.</text>

  <!-- arrow to block 3 -->
  <path d="M762 350 L808 350" stroke="#6b6f76" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ============ Block 3: yll ============ -->
  <text x="830" y="100" font-size="14" font-weight="700" letter-spacing="0.5" fill="#8a5a2b">3 · TURN INTO YEARS OF LIFE</text>

  <line x1="950" y1="163" x2="950" y2="272" stroke="#c3c1b8" stroke-width="1"/>
  <g font-size="12.5" fill="#3b3f45">
    <text x="828" y="182">Heart disease</text>
    <text x="828" y="210">Stroke</text>
    <text x="828" y="238">Type 2 diabetes</text>
    <text x="828" y="266">Colorectal cancer</text>
  </g>
  <!-- each bar = baseline disease burden; solid = burden after the meal, hatched tail = the change -->
  <g stroke="#b7b5ac" stroke-width="0.8">
    <rect x="950"  y="171" width="74" height="13" fill="#4e9d5b"/>
    <rect x="1024" y="171" width="18" height="13" fill="url(#hatchGreen)"/>
    <rect x="950"  y="171" width="92" height="13" fill="none"/>

    <rect x="950"  y="199" width="49" height="13" fill="#4e9d5b"/>
    <rect x="999"  y="199" width="11" height="13" fill="url(#hatchGreen)"/>
    <rect x="950"  y="199" width="60" height="13" fill="none"/>

    <rect x="950"  y="227" width="41" height="13" fill="#4e9d5b"/>
    <rect x="991"  y="227" width="12" height="13" fill="url(#hatchGreen)"/>
    <rect x="950"  y="227" width="53" height="13" fill="none"/>

    <rect x="950"  y="255" width="32" height="13" fill="#bf4d45"/>
    <rect x="982"  y="255" width="7"  height="13" fill="url(#hatchRed)"/>
    <rect x="950"  y="255" width="39" height="13" fill="none"/>
  </g>
  <text x="996" y="290" font-size="12" fill="#7a7f87" text-anchor="middle">each bar = a disease's burden</text>
  <text x="996" y="307" font-size="12" fill="#7a7f87" text-anchor="middle">hatched = this meal's effect</text>

  <rect x="828" y="333" width="214" height="94" rx="10" fill="#eef5ef" stroke="#bcd8c2" stroke-width="1.2"/>
  <text x="935" y="362" font-size="14" fill="#3b3f45" text-anchor="middle">net effect on your</text>
  <text x="935" y="396" font-size="25" font-weight="700" fill="#2f7d43" text-anchor="middle">years of life</text>
  <text x="935" y="417" font-size="12.5" fill="#5c616a" text-anchor="middle">gained or lost vs. baseline</text>

  <!-- legend -->
  <g font-size="12.5" fill="#5c616a">
    <rect x="40"  y="533" width="14" height="14" rx="2" fill="#4e9d5b"/><text x="60"  y="545">fruit &amp; veg</text>
    <rect x="152" y="533" width="14" height="14" rx="2" fill="#d6a95c"/><text x="172" y="545">grains, legumes, nuts</text>
    <rect x="338" y="533" width="14" height="14" rx="2" fill="#bf4d45"/><text x="358" y="545">red &amp; processed meat</text>
    <rect x="530" y="533" width="14" height="14" rx="2" fill="#c4c3bd"/><text x="550" y="545">other foods (calories only)</text>
    <text x="1080" y="545" text-anchor="end" font-style="italic" fill="#9a9ea4">schematic; proportions illustrative</text>
  </g>
</svg>
